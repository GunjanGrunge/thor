  </text>

  <!-- arrows -->
  <path d="M470 520H585" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M980 520H1095" stroke="#475569" stroke-width="5" marker-end="url(#arrowSlate)"/>
  <path d="M345 676C345 744 666 812 800 812C934 812 1235 744 1235 676" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="640" y="854" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18">

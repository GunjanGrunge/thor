  </text>
  <text x="235" y="390" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    deduplication, noise cleaning
  </text>

  <text x="235" y="452" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Retrieval fabric
  </text>
  <text x="235" y="482" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Chunking, embeddings, evidence windows,
  </text>
  <text x="235" y="506" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    inference-time factual context
  </text>

  <text x="235" y="568" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Grounded supervision
  </text>
  <text x="235" y="598" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Task-shaped example generation,
  </text>
  <text x="235" y="622" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    validation, rewrite gate, gold QC
  </text>

  <!-- Model icons -->
  <circle cx="690" cy="340" r="34" fill="#D97706" fill-opacity="0.10" stroke="#D97706"/>
  <rect x="668" y="318" width="44" height="44" rx="10" fill="#D97706"/>
  <rect x="681" y="331" width="18" height="18" rx="4" fill="#FFFBEB"/>
  <path d="M676 312V302M690 312V302M704 312V302M676 378V368M690 378V368M704 378V368" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>

  <circle cx="690" cy="470" r="34" fill="#D97706" fill-opacity="0.10" stroke="#D97706"/>
  <path d="M666 488V454C666 441 676 432 690 432C704 432 714 441 714 454V488" fill="#D97706"/>
  <circle cx="690" cy="453" r="11" fill="#FFFBEB"/>

  <text x="745" y="336" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Consultation-tuned adapter
  </text>
  <text x="745" y="366" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    LoRA fine-tuning for screening,
  </text>
  <text x="745" y="390" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    adaptation, planning, reasoning behavior
  </text>

  <text x="745" y="466" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Inference engine
  </text>
  <text x="745" y="496" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Merges user constraints with retrieved
  </text>
  <text x="745" y="520" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    evidence before recommendation generation
  </text>

  <!-- Product icons -->
  <circle cx="1200" cy="340" r="34" fill="#059669" fill-opacity="0.10" stroke="#059669"/>
  <path d="M1200 316L1220 324V341C1220 355 1211 368 1200 374C1189 368 1180 355 1180 341V324L1200 316Z" fill="#059669"/>
  <path d="M1192 342L1198 348L1209 334" stroke="#ECFDF5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="1200" cy="470" r="34" fill="#059669" fill-opacity="0.10" stroke="#059669"/>
  <rect x="1178" y="448" width="44" height="44" rx="10" fill="#059669"/>
  <path d="M1188 463H1212M1188 473H1212M1188 483H1204" stroke="#ECFDF5" stroke-width="4" stroke-linecap="round"/>

  <text x="1255" y="336" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">

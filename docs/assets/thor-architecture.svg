  </text>

  <text x="1255" y="466" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Product rendering
  </text>
  <text x="1255" y="496" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">

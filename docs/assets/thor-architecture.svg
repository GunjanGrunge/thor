<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F4F7FB"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="amberCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowSlate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1600" height="920" rx="28" fill="url(#bg)"/>

  <text x="80" y="92" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">
    Thor System Architecture
  </text>
  <text x="80" y="130" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Evidence plane + consultation model + product experience, designed as a production stack rather than a single-model demo.
  </text>

  <rect x="70" y="180" width="1460" height="650" rx="30" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="135" y="236" fill="#2563EB" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    EVIDENCE PLANE
  </text>
  <text x="625" y="236" fill="#D97706" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    MODEL PLANE
  </text>
  <text x="1075" y="236" fill="#059669" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    EXPERIENCE PLANE
  </text>

  <g filter="url(#shadow)">
    <rect x="110" y="270" width="360" height="500" rx="28" fill="url(#blueCard)" stroke="#93C5FD"/>
    <rect x="620" y="270" width="360" height="500" rx="28" fill="url(#amberCard)" stroke="#FDBA74"/>
    <rect x="1130" y="270" width="360" height="500" rx="28" fill="url(#greenCard)" stroke="#86EFAC"/>
  </g>

  <!-- Evidence icons -->
  <circle cx="180" cy="340" r="34" fill="#2563EB" fill-opacity="0.10" stroke="#2563EB"/>
  <path d="M155 334C155 326 166 320 180 320C194 320 205 326 205 334V350C205 358 194 364 180 364C166 364 155 358 155 350V334Z" fill="#2563EB"/>
  <ellipse cx="180" cy="334" rx="25" ry="10" fill="#DBEAFE"/>
  <ellipse cx="180" cy="350" rx="25" ry="10" fill="#BFDBFE"/>

  <circle cx="180" cy="456" r="34" fill="#2563EB" fill-opacity="0.10" stroke="#2563EB"/>
  <path d="M162 440H198L207 456L198 472H162L153 456L162 440Z" fill="#2563EB"/>
  <circle cx="180" cy="456" r="8" fill="#DBEAFE"/>

  <circle cx="180" cy="572" r="34" fill="#2563EB" fill-opacity="0.10" stroke="#2563EB"/>
  <rect x="160" y="550" width="40" height="44" rx="8" fill="#2563EB"/>
  <path d="M169 565H191" stroke="#DBEAFE" stroke-width="4" stroke-linecap="round"/>
  <path d="M169 575H191" stroke="#DBEAFE" stroke-width="4" stroke-linecap="round"/>
  <path d="M169 585H184" stroke="#DBEAFE" stroke-width="4" stroke-linecap="round"/>

  <text x="235" y="336" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Curated domain corpus
  </text>
  <text x="235" y="366" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
